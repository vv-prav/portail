<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#14100b">
    <title>Mots Fléchés du jour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="is-boot">

    <div class="boot" id="boot"><div class="boot-ring"></div></div>

    <div class="mf" id="mf">
        <header class="mf-head">
            <a class="mf-back" href="/" aria-label="Retour au salon">←</a>
            <div class="mf-titles">
                <h1 class="mf-title">Mots Fléchés</h1>
                <span class="mf-date" id="mf-date"></span>
            </div>
            <div class="mf-timer" id="mf-timer">0:00</div>
        </header>

        <div class="mf-levels" id="mf-levels" role="tablist">
            <button class="lv" data-lv="facile" type="button">Facile</button>
            <button class="lv" data-lv="moyen" type="button">Moyen</button>
            <button class="lv" data-lv="difficile" type="button">Difficile</button>
        </div>

        <div class="mf-clue" id="mf-clue">Touche une case pour commencer.</div>

        <div class="mf-grid-wrap">
            <div class="mf-grid" id="mf-grid"></div>
            <div class="mf-start" id="mf-start">
                <div class="mf-start-box">
                    <div class="mf-start-emoji">🧩</div>
                    <p class="mf-start-txt">Le chrono démarre dès que tu commences<br>et ne s'arrête plus.</p>
                    <button class="mf-btn" id="mf-start-btn" type="button">Commencer</button>
                </div>
            </div>
        </div>

        <div class="mf-inline-board" id="mf-inline-board" hidden></div>

        <div class="mf-actions">
            <button class="mf-btn" id="mf-check" type="button">Vérifier</button>
            <button class="mf-btn ghost" id="mf-giveup" type="button">Abandonner</button>
        </div>

        <div class="mf-keyboard" id="mf-keyboard"></div>
    </div>

    <!-- Panneau de fin : temps + classement -->
    <div class="mf-overlay" id="mf-end" hidden>
        <div class="mf-card">
            <div class="mf-end-emoji" id="mf-end-emoji">🎉</div>
            <h2 class="mf-end-title" id="mf-end-title">Grille résolue !</h2>
            <p class="mf-end-sub" id="mf-end-sub"></p>
            <div class="mf-board" id="mf-board"></div>
            <button class="mf-btn" id="mf-end-close" type="button">Fermer</button>
            <a class="mf-btn ghost" href="/">Retour au salon</a>
        </div>
    </div>

    <!-- Confirmation d'abandon -->
    <div class="mf-overlay" id="mf-confirm" hidden>
        <div class="mf-card">
            <div class="mf-end-emoji">🏳️</div>
            <h2 class="mf-end-title">Abandonner ?</h2>
            <p class="mf-end-sub">Les réponses seront révélées et tu ne figureras pas au classement du jour.</p>
            <button class="mf-btn danger" id="mf-confirm-yes" type="button">Oui, montrer les réponses</button>
            <button class="mf-btn ghost" id="mf-confirm-no" type="button">Continuer à jouer</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
