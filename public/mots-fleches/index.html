<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#14100b">
    <title>Mots Fléchés du jour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="boot" id="boot"><div class="boot-ring"></div></div>

    <div class="mf" id="mf" hidden>
        <header class="mf-head">
            <a class="mf-back" href="/">←</a>
            <div class="mf-titles">
                <h1 class="mf-title">Mots Fléchés</h1>
                <span class="mf-date" id="mf-date"></span>
            </div>
            <button class="mf-check" id="mf-check" type="button">Vérifier</button>
        </header>

        <div class="mf-clue" id="mf-clue">Touche une case pour commencer.</div>

        <div class="mf-grid-wrap">
            <div class="mf-grid" id="mf-grid"></div>
        </div>

        <div class="mf-solved" id="mf-solved" hidden>🎉 Grille résolue ! Bravo.</div>

        <div class="mf-keyboard" id="mf-keyboard"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
